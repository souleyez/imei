<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外箱标签打印</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        
        .header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .header h1 { margin-bottom: 10px; }
        .header p { color: #666; font-size: 14px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .form-group textarea { resize: vertical; font-family: monospace; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #409eff; color: white; }
        
        .label-list { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .label-item { padding: 8px 12px; background: #f5f5f5; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .label-item.selected { background: #409eff; color: white; }
        
        .preview { margin-top: 20px; }
        
        .box-label { border: 2px solid #333; padding: 0; margin-bottom: 30px; page-break-after: always; max-width: 600px; margin: 0 auto 30px; background: white; overflow: hidden; }
        .box-header { background: #1e88e5; color: white; text-align: center; padding: 12px; }
        .box-title { font-size: 22px; font-weight: bold; }
        .box-body { padding: 15px; }
        .box-section { margin-bottom: 12px; }
        .box-section-title { font-size: 11px; color: #666; margin-bottom: 3px; }
        .box-barcode { text-align: center; margin: 8px 0; }
        .box-barcode canvas { max-width: 100%; height: 50px; }
        .box-content { font-size: 11px; word-break: break-all; line-height: 1.4; text-align: center; }
        .box-bottom { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 15px; border-top: 1px solid #eee; }
        .box-bottom-left { flex: 1; }
        .box-bottom-right { text-align: center; }
        .box-bottom-right canvas { width: 70px; height: 70px; }
        .label-id { font-size: 14px; font-weight: bold; color: #333; }
        
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .box-label { border: 2px solid #000; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 控制面板 -->
        <div class="header no-print">
            <h1>📦 外箱标签打印</h1>
            <p>项目: {{ projectName }} | 批次: {{ batchName }}</p>
        </div>
        
        <div class="card no-print">
            <div class="form-group">
                <label>批次文案信息</label>
                <input v-model="batchInfo" placeholder="如 2026年第一批货">
            </div>
            
            <div class="form-group">
                <label>选择IMEI（当前已选 {{ selectedImeis.length }} 个，最多12个）</label>
                <div class="label-list">
                    <div v-for="(item, i) in imeiList" :key="i" 
                         class="label-item" 
                         :class="{selected: selectedImeis.includes(item.imei)}"
                         @click="toggleImei(item.imei)">
                        {{ item.imei }}
                    </div>
                </div>
                <p v-if="imeiList.length === 0" style="color:#999;">暂无IMEI数据</p>
            </div>
            
            <button class="btn btn-primary" @click="generateLabels" :disabled="selectedImeis.length === 0">
                生成外箱标签 ({{ selectedImeis.length }}个)
            </button>
        </div>
        
        <!-- 预览区域 -->
        <div class="preview">
            <div v-for="(label, i) in previewLabels" :key="i" class="box-label">
                <div class="box-header">
                    <div class="box-title">{{ projectName }}</div>
                </div>
                <div class="box-body">
                    <div class="box-section">
                        <div class="box-section-title">IMEI</div>
                        <div class="box-barcode"><canvas :id="'imei-'+i"></canvas></div>
                        <div class="box-content">{{ label.imeis.join(',') }}</div>
                    </div>
                </div>
                <div class="box-bottom">
                    <div class="box-bottom-left">
                        <div class="box-section">
                            <div class="box-section-title">MAC</div>
                            <div class="box-barcode"><canvas :id="'mac-'+i"></canvas></div>
                            <div class="box-content">{{ label.macs.join(',') }}</div>
                        </div>
                    </div>
                    <div class="box-bottom-right">
                        <canvas :id="'qr-'+i"></canvas>
                        <div class="label-id">{{ i+1 }}</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="no-print" style="text-align:center;margin-top:20px;">
            <button class="btn btn-primary" onclick="window.print()">打印全部</button>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, nextTick } = Vue;
        
        createApp({
            setup() {
                const projectName = ref('');
                const batchName = ref('');
                const batchInfo = ref('');
                const imeiList = ref([]);
                const selectedImeis = ref([]);
                const previewLabels = ref([]);
                
                // 从URL参数获取数据
                const params = new URLSearchParams(window.location.search);
                const projectId = params.get('project');
                const batchId = params.get('batch');
                
                const loadData = async () => {
                    if (!batchId) return;
                    
                    // 获取批次信息
                    const batchRes = await fetch('/imei/api/batches/' + batchId);
                    const batch = await batchRes.json();
                    batchName.value = batch.name;
                    batchInfo.value = batch.info || '';
                    projectName.value = params.get('projectName') || batch.name;
                    
                    // 获取批次标签
                    const labelsRes = await fetch('/imei/api/batches/' + batchId + '/labels');
                    const data = await labelsRes.json();
                    imeiList.value = data;
                };
                
                const toggleImei = (imei) => {
                    const idx = selectedImeis.value.indexOf(imei);
                    if (idx >= 0) {
                        selectedImeis.value.splice(idx, 1);
                    } else if (selectedImeis.value.length < 12) {
                        selectedImeis.value.push(imei);
                    }
                };
                
                const generateLabels = async () => {
                    if (selectedImeis.value.length === 0) return;
                    
                    // 获取选中的MAC
                    const selected = imeiList.value.filter(i => selectedImeis.value.includes(i.imei));
                    const imeis = selected.map(i => i.imei);
                    const macs = selected.map(i => i.mac);
                    
                    // 生成分组（每12个一组）
                    const groups = [];
                    for (let i = 0; i < imeis.length; i += 12) {
                        groups.push({
                            imeis: imeis.slice(i, i + 12),
                            macs: macs.slice(i, i + 12),
                            batchInfo: batchInfo.value
                        });
                    }
                    
                    previewLabels.value = groups;
                    
                    // 生成条形码和二维码
                    await nextTick();
                    groups.forEach((g, i) => {
                        // IMEI条形码
                        const imeiCanvas = document.getElementById('imei-' + i);
                        if (imeiCanvas && g.imeis.length > 0) {
                            try {
                                JsBarcode(imeiCanvas, g.imeis.join(','), { 
                                    format: 'CODE128', 
                                    height: 40, 
                                    displayValue: false,
                                    width: 2
                                });
                            } catch(e) {}
                        }
                        
                        // MAC条形码
                        const macCanvas = document.getElementById('mac-' + i);
                        if (macCanvas && g.macs.length > 0) {
                            try {
                                JsBarcode(macCanvas, g.macs.join(','), { 
                                    format: 'CODE128', 
                                    height: 40, 
                                    displayValue: false,
                                    width: 2
                                });
                            } catch(e) {}
                        }
                        
                        // 二维码
                        const qrCanvas = document.getElementById('qr-' + i);
                        if (qrCanvas) {
                            const qrContent = [...g.imeis, ...g.macs].join(',');
                            try {
                                QRCode.toCanvas(qrCanvas, qrContent, { width: 100, margin: 0 });
                            } catch(e) {}
                        }
                    });
                };
                
                onMounted(() => {
                    loadData();
                });
                
                return {
                    projectName, batchName, batchInfo, imeiList, selectedImeis, previewLabels,
                    toggleImei, generateLabels
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
